<div
  class="max-w-80 grid max-sm:grid-cols-1 max-md:grid-cols-2 grid-cols-3 gap-7 mx-14"
>
  @for (Note of Notes?.data; track Notes?.data?._id) {
  <div
    class="container border-[1px] border-solid border-gray-300 p-2 rounded hover:shadow-2xl"
  >
    <div class="flex items-center justify-between gap-5 w-full">
      <div>
        <h1>{{ Note?.Title }}</h1>
        <p class="text-[10px] text-gray-400">
          {{ Note?.Day }}th {{ Note?.Month }} {{ Note?.Year }}
        </p>
        <p>{{ Note?.Summary }}</p>
      </div>
      <div>
        <img
          src="/keep_24dp_5F6368_FILL0_wght400_GRAD0_opsz24.png"
          alt="save-png"
          class="w-4 cursor-pointer"
        />
      </div>
    </div>
    <div class="flex items-center justify-between gap-3">
      <div>
        <p>#Hastags</p>
      </div>
      <div class="flex gap-1">
        <img
          src="/edit_24dp_5F6368_FILL0_wght400_GRAD0_opsz24.png"
          alt=""
          class="w-4 cursor-pointer"
        />
        <img
          src="/delete_24dp_5F6368_FILL0_wght400_GRAD0_opsz24.png"
          alt=""
          class="w-4 cursor-pointer"
        />
      </div>
    </div>
  </div>
  }
</div>
