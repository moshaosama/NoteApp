<div class="border-[1px] shadow-lg rounded p-5 border-solid border-[#aaa]">
    <h1 class="text-[2pc] font-bold">Login</h1>
    <div>
        <form>
            <input type="text" placeholder="Email" class="w-full border-[1px] border-solid border-[#eee] p-2 rounded my-3">
            <input type="password" placeholder="password" class="w-full border-[1px] border-solid border-[#eee] p-2 rounded my-3">
            <button class="w-full bg-blue-500 text-white p-1 rounded my-3">Submit</button>
        </form>
        <p class="flex justify-center my-2">
            No Register Yet? <a routerLink="/signUp" class="underline decoration-blue-700 text-blue-700 font-bold mx-2">Create a New Account</a>
        </p>
    </div>
</div>
