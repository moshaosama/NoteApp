<div class="border-[1px] shadow-lg rounded p-5 border-solid border-[#aaa]">
    <h1 class="text-[2pc] font-bold">signUp</h1>
    <div>
        <form>
            <p class="flex">
                <input type="text" placeholder="FirstName" class="w-full mx-1 border-[1px] border-solid border-[#eee] p-2 rounded my-3">
                <input type="text" placeholder="LastName" class="w-full border-[1px] border-solid border-[#eee] p-2 rounded my-3">
            </p>
            <p class="flex">
                <input type="text" placeholder="Phone" class="w-full mx-1 border-[1px] border-solid border-[#eee] p-2 rounded">
                <input type="text" placeholder="Address" class="w-full  border-[1px] border-solid border-[#eee] p-2 rounded">
            </p>
            <input type="text" placeholder="Email" class="w-full border-[1px] border-solid border-[#eee] p-2 rounded my-2">
            <input type="password" placeholder="password" class="w-full border-[1px] border-solid border-[#eee] p-2 rounded my-2">
            <input type="Check Password" placeholder="password" class="w-full border-[1px] border-solid border-[#eee] p-2 rounded my-2">
            <button class="w-full bg-blue-500 text-white p-1 rounded my-3">Submit</button>
        </form>
    </div>
</div>
